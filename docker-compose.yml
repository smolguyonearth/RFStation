version: "3.8"

services:
  # Container 1: Backend
  backend:
    build: 
      context: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules # Prevents local modules from overriding container
    command: bun run dev # Runs with --watch enabled
    networks:
      - app-network

  # Container 2: Frontend
  frontend:
    build: 
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local modules from overriding container
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge